spring:
  application:
    name: bff

server:
  port: 8084

pedidos:
  url: http://localhost:8082
envios:
  url: http://localhost:8083

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    cl.smartlogix.bff: DEBUG

resilience4j:
  circuitbreaker:
    instances:
      pedidos:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 5s
        permitted-number-of-calls-in-half-open-state: 3
      envios:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 5s
  timelimiter:
    instances:
      pedidos:
        timeout-duration: 3s
      envios:
        timeout-duration: 3s