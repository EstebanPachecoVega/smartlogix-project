spring:
  application:
    name: ms-pedidos

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${JWT_JWK_SET_URI:http://localhost:8180/realms/smartlogix/protocol/openid-connect/certs}
          
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3307}/${DB_NAME:db_pedidos}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:rootpassword}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_MAX:30}
      minimum-idle: ${DB_POOL_MIN:5}
      idle-timeout: 60000
      connection-timeout: 10000
      max-lifetime: 1800000
      leak-detection-threshold: 15000

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: ${JPA_SHOW_SQL:false}
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        naming:
          physical_naming_strategy: org.springframework.boot.orm.jpa.hibernate.SpringPhysicalNamingStrategy

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: ${REDIS_POOL_MAX:40}
          max-idle: ${REDIS_POOL_IDLE:20}
          min-idle: ${REDIS_POOL_MIN:5}
          max-wait: 2000ms

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBIT_PORT:5672}
    username: ${RABBIT_USER:guest}
    password: ${RABBIT_PASSWORD:guest}
    listener:
      simple:
        concurrency: 4
        max-concurrency: 8
        prefetch: 10
        retry:
          enabled: true
          initial-interval: 2000ms
          max-attempts: 3
          multiplier: 2
        default-requeue-rejected: false
  zipkin:
    base-url: http://zipkin:9411

server:
  port: ${SERVER_PORT:8082}

inventario:
  url: ${INVENTARIO_URL:http://localhost:8081}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    root: INFO
    cl.smartlogix: ${LOGGING_LEVEL_SMARTLOGIX:INFO}
  pattern:
    console: "{\"timestamp\":\"%d{ISO8601}\",\"level\":\"%p\",\"correlationId\":\"%X{correlationId}\",\"message\":\"%m\",\"logger\":\"%c\"}%n"

resilience4j:
  circuitbreaker:
    instances:
      inventario:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 5s
        permitted-number-of-calls-in-half-open-state: 3

management:
  tracing:
    sampling:
      probability: 0.2
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

pedido:
  idempotencia:
    ttl-minutes: 30