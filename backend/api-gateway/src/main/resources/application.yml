spring:
    application:
        name: api-gateway
    cloud:
        gateway:
            routes:
                - id: bff_route
                  uri: http://localhost:8084
                  predicates:
                      - Path=/bff/**
                  filters:
                      - name: CircuitBreaker
                        args:
                            name: bffCircuitBreaker
                            fallbackUri: forward:/fallback
                      - name: RequestRateLimiter
                        args:
                            key-resolver: "#{@userKeyResolver}"
                            redis-rate-limiter:
                                replenishRate: 10
                                burstCapacity: 20
                                requestedTokens: 1
    data:
        redis:
            host: localhost
            port: 6379
    security:
        oauth2:
            resourceserver:
                jwt:
                    jwk-set-uri: http://localhost:8080/realms/smartlogix/protocol/openid-connect/certs
    web:
        error:
            include-message: always
    main:
        web-application-type: reactive

server:
    port: 8080

resilience4j:
    circuitbreaker:
        instances:
            bffCircuitBreaker:
                sliding-window-size: 10
                failure-rate-threshold: 50
                wait-duration-in-open-state: 5s
                permitted-number-of-calls-in-half-open-state: 3

logging:
    level:
        org.springframework.cloud.gateway: DEBUG
        cl.smartlogix.gateway: DEBUG
    pattern:
        console: '{"timestamp":"%d{ISO8601}","level":"%p","correlationId":"%X{correlationId}","message":"%m","logger":"%c"}%n'

management:
    endpoints:
        web:
            exposure:
                include: health,info,circuitbreakers,gateway
    endpoint:
        gateway:
            enabled: true
