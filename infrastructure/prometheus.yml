global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "api-gateway"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["api-gateway:8080"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        regex: "([^:]+):\\d+"
        replacement: "${1}"

  - job_name: "bff"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["bff:8084"]

  - job_name: "ms-inventario"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["ms-inventario:8081"]

  - job_name: "ms-pedidos"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["ms-pedidos:8082"]

  - job_name: "ms-envios"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["ms-envios:8083"]
