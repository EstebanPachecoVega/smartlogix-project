name: E2E Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      MYSQL_ROOT_PASSWORD: rootpassword
      RABBITMQ_USER: guest
      RABBITMQ_PASS: guest
      DB_INVENTARIO_NAME: db_inventario
      DB_PEDIDOS_NAME: db_pedidos
      DB_ENVIOS_NAME: db_envios
      KEYCLOAK_ADMIN_USER: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KEYCLOAK_INTERNAL_ISSUER: http://keycloak:8080/realms/smartlogix
      JWT_JWK_SET_URI: http://keycloak:8080/realms/smartlogix/protocol/openid-connect/certs
      NEXTAUTH_SECRET: dGhpcy1pcy1hLXNlY3JldC1rZXktZm9yLW5leHRhdXRoLXRlc3RpbmcK
      CORS_ALLOWED_ORIGINS: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - name: Start services
        run: |
          docker compose -f docker-compose.yml -f docker-compose.ci.yml up -d --build --wait
          docker compose ps

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: cd frontend && pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: cd frontend && npx playwright install --with-deps chromium firefox

      - name: Run E2E tests
        run: cd frontend && npx playwright test
        env:
          BASE_URL: http://localhost:3000
          KEYCLOAK_ISSUER: http://localhost:8180/realms/smartlogix
          KEYCLOAK_ADMIN_USER: admin
          KEYCLOAK_ADMIN_PASSWORD: admin
          NEXT_PUBLIC_GATEWAY_URL: http://localhost:8080
          NEXT_PUBLIC_BFF_URL: http://localhost:8084/bff
          NEXTAUTH_SECRET: dGhpcy1pcy1hLXNlY3JldC1rZXktZm9yLW5leHRhdXRoLXRlc3RpbmcK
          KEYCLOAK_CLIENT_ID: smartlogix-frontend

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

      - name: Upload Docker logs on failure
        if: failure()
        run: docker compose logs --tail=200 > docker-logs.txt

      - name: Upload logs artifact
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: docker-logs
          path: docker-logs.txt
          retention-days: 3
