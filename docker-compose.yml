name: smartlogix-project
services:
  # ==========================================
  # 1. BASES DE DATOS
  # ==========================================
  mysql-inventario:
    image: mysql:8.0
    container_name: smartlogix-db-inventario
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_INVENTARIO_NAME}
    volumes:
      - mysql_inventario_data:/var/lib/mysql
    networks:
      - smartlogix-network
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  mysql-pedidos:
    image: mysql:8.0
    container_name: smartlogix-db-pedidos
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_PEDIDOS_NAME}
    volumes:
      - mysql_pedidos_data:/var/lib/mysql
    networks:
      - smartlogix-network
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  mysql-envios:
    image: mysql:8.0
    container_name: smartlogix-db-envios
    restart: unless-stopped
    ports:
      - "3308:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_ENVIOS_NAME}
    volumes:
      - mysql_envios_data:/var/lib/mysql
    networks:
      - smartlogix-network
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # 2. BROKER DE MENSAJERÍA Y CACHÉ
  # ==========================================
  rabbitmq:
    image: rabbitmq:3.12-management
    container_name: smartlogix-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - smartlogix-network
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2-alpine
    container_name: smartlogix-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - smartlogix-network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # 3. MICROSERVICIOS
  # ==========================================
  ms-inventario:
    build: ./backend/ms-inventario
    container_name: ms-inventario
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      DB_HOST: mysql-inventario
      DB_PORT: 3306
      DB_NAME: ${DB_INVENTARIO_NAME}
      DB_USER: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_HOST: rabbitmq
      RABBIT_PORT: 5672
      RABBIT_USER: ${RABBITMQ_USER}
      RABBIT_PASSWORD: ${RABBITMQ_PASS}
      SERVER_PORT: 8081
      JPA_DDL_AUTO: update
      JWT_JWK_SET_URI: ${JWT_JWK_SET_URI}
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      mysql-inventario:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - smartlogix-network

  ms-pedidos:
    build: ./backend/ms-pedidos
    container_name: ms-pedidos
    restart: unless-stopped
    ports:
      - "8082:8082"
    environment:
      DB_HOST: mysql-pedidos
      DB_PORT: 3306
      DB_NAME: ${DB_PEDIDOS_NAME}
      DB_USER: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RABBITMQ_HOST: rabbitmq
      RABBIT_PORT: 5672
      RABBIT_USER: ${RABBITMQ_USER}
      RABBIT_PASSWORD: ${RABBITMQ_PASS}
      INVENTARIO_URL: http://ms-inventario:8081
      SERVER_PORT: 8082
      JPA_DDL_AUTO: update
      JWT_JWK_SET_URI: ${JWT_JWK_SET_URI}
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      mysql-pedidos:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      ms-inventario:
        condition: service_started
    networks:
      - smartlogix-network

  ms-envios:
    build: ./backend/ms-envios
    container_name: ms-envios
    restart: unless-stopped
    ports:
      - "8083:8083"
    environment:
      DB_HOST: mysql-envios
      DB_PORT: 3306
      DB_NAME: ${DB_ENVIOS_NAME}
      DB_USER: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      RABBITMQ_HOST: rabbitmq
      RABBIT_PORT: 5672
      RABBIT_USER: ${RABBITMQ_USER}
      RABBIT_PASSWORD: ${RABBITMQ_PASS}
      SERVER_PORT: 8083
      JPA_DDL_AUTO: update
      JWT_JWK_SET_URI: ${JWT_JWK_SET_URI}
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      mysql-envios:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - smartlogix-network

  # ==========================================
  # 4. API GATEWAY
  # ==========================================
  api-gateway:
    build: ./backend/api-gateway
    container_name: api-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: ${JWT_JWK_SET_URI}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      redis:
        condition: service_healthy
      ms-inventario:
        condition: service_started
      ms-pedidos:
        condition: service_started
      ms-envios:
        condition: service_started
    networks:
      - smartlogix-network

  # ==========================================
  # 5. BFF (Backend For Frontend)
  # ==========================================
  bff:
    build: ./backend/bff
    container_name: bff
    restart: unless-stopped
    ports:
      - "8084:8084"
    environment:
      GATEWAY_URL: http://api-gateway:8080
      SERVER_PORT: 8084
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      api-gateway:
        condition: service_started
    networks:
      - smartlogix-network
  # ==========================================
  # 6. FRONTEND
  # ==========================================
  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8084
        NEXT_PUBLIC_KEYCLOAK_URL: http://localhost:8180
        NEXT_PUBLIC_BFF_URL: http://localhost:8084/bff
        NEXT_PUBLIC_GATEWAY_URL: http://localhost:8080
        NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME: dtkxwlj5g
        NEXT_PUBLIC_CLOUDINARY_UPLOAD_PRESET: smartlogix_preset
    container_name: smartlogix-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      KEYCLOAK_CLIENT_ID: smartlogix-frontend
      KEYCLOAK_ISSUER: http://localhost:8180/realms/smartlogix
      KEYCLOAK_INTERNAL_ISSUER: ${KEYCLOAK_INTERNAL_ISSUER}
      KEYCLOAK_ADMIN_USER: ${KEYCLOAK_ADMIN_USER}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME: dtkxwlj5g
      NEXT_PUBLIC_CLOUDINARY_UPLOAD_PRESET: smartlogix_preset
    depends_on:
      bff:
        condition: service_started
      keycloak:
        condition: service_started
    networks:
      - smartlogix-network

  # ==========================================
  # 7. KEYCLOAK
  # ==========================================
  keycloak:
    image: quay.io/keycloak/keycloak:24.0.1
    container_name: smartlogix-keycloak
    restart: unless-stopped
    ports:
      - "8180:8080"
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN_USER}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_DB: dev-file
      KC_HOSTNAME: localhost
      KC_HOSTNAME_PORT: 8180
      KC_HTTP_ENABLED: true
      KC_PROXY_EDGE: true
    volumes:
      - ./infrastructure/smartlogix-realm.json:/opt/keycloak/data/import/smartlogix-realm.json
      - keycloak_data:/opt/keycloak/data
    command: start-dev --import-realm
    networks:
      - smartlogix-network

  # ==========================================
  # 8. OBSERVABILIDAD — Tracing + Métricas + Logs
  # ==========================================
  zipkin:
    image: openzipkin/zipkin:3
    container_name: smartlogix-zipkin
    restart: unless-stopped
    ports:
      - "9411:9411"
    networks:
      - smartlogix-network

  prometheus:
    image: prom/prometheus:v3.3.1
    container_name: smartlogix-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./infrastructure/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
      - "--web.enable-lifecycle"
    networks:
      - smartlogix-network

  loki:
    image: grafana/loki:3.3.2
    container_name: smartlogix-loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - smartlogix-network

  grafana:
    image: grafana/grafana:11.5.2
    container_name: smartlogix-grafana
    restart: unless-stopped
    ports:
      - "4000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_INSTALL_PLUGINS: ""
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infrastructure/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml
    depends_on:
      - prometheus
      - loki
    networks:
      - smartlogix-network

# ==========================================
# REDES Y VOLÚMENES
# ==========================================
networks:
  smartlogix-network:
    driver: bridge

volumes:
  mysql_inventario_data:
  mysql_pedidos_data:
  mysql_envios_data:
  rabbitmq_data:
  redis_data:
  keycloak_data:
  prometheus_data:
  grafana_data:
